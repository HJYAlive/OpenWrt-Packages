name: Build GecoosAC APK for AN7581

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动点击运行

jobs:
  Build_APK:
    runs-on: ubuntu-latest
    # 使用官方针对 AN7581 架构预置的 SDK 容器
    container: openwrt/sdk:airoha-an7581

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Prepare SDK and Source
        run: |
          # 1. 进入容器内的 SDK 根目录
          # 官方镜像的 SDK 通常在 /home/build/openwrt 或当前目录
          # 我们先确认环境并更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 2. 拷贝你的源码到 SDK 的 package 目录
          # 自动识别仓库中的 luci-app-gecoosac 或 gecoosac 文件夹
          if [ -d "luci-app-gecoosac" ]; then
            cp -r luci-app-gecoosac package/gecoosac
          elif [ -d "gecoosac" ]; then
            cp -r gecoosac package/gecoosac
          else
            echo "❌ 错误：仓库根目录未发现源码文件夹！请确保文件夹名为 luci-app-gecoosac"
            ls -R
            exit 1
          fi

      - name: Compile Package
        run: |
          # 3. 生成默认配置
          make defconfig
          
          # 4. 执行编译 (针对新版 APK v3 格式)
          # V=s 用于显示详细日志，方便报错排查
          make package/gecoosac/compile V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gecoosac-an7581-apk
          # 编译出的文件通常在 bin/packages/... 目录下
          path: bin/targets/airoha/an7581/packages/*.apk
