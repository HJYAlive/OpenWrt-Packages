name: Build GecoosAC APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Build_APK:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build in Docker Container
        run: |
          # 1. 宿主机赋予权限
          chmod -R 777 .

          # 2. 运行官方 SDK 镜像进行编译
          # 我们把当前仓库挂载到容器内的 package/custom 目录
          docker run --rm \
            -v "$(pwd)":/home/build/openwrt/package/custom \
            -w /home/build/openwrt \
            openwrt/sdk:aarch64_cortex-a53 \
            bash -c "
              # 更新 feeds
              ./scripts/feeds update -a && ./scripts/feeds install -a
              
              # 自动配置
              make defconfig
              
              # 编译插件 (针对新版 APK v3 格式)
              # 注意：如果你的 Makefile 在子文件夹里，SDK 也会自动扫描到
              make package/custom/compile V=s
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gecoosac-aarch64-apk
          # 宽泛匹配，确保能抓到生成的 .apk 文件
          path: bin/**/*.apk
