name: Build GecoosAC APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Build_APK:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Cleanup and Fix Permissions
        run: |
          # 1. 强制清理上一次残留的 root 权限目录
          sudo rm -rf output_bin
          # 2. 赋予当前目录全权
          sudo chmod -R 777 .

      - name: Build in Docker Container
        run: |
          # 3. 运行官方 SDK 镜像
          # 挂载宿主机当前目录到容器 /tmp/custom
          docker run --rm \
            -v "$(pwd)":/tmp/custom \
            openwrt/sdk:aarch64_cortex-a53 \
            bash -c "
              cd /home/build/openwrt
              
              # 拷贝源码到 SDK 目录
              mkdir -p package/custom
              cp -r /tmp/custom/* package/custom/

              # 更新 Feeds 并编译
              ./scripts/feeds update -a && ./scripts/feeds install -a
              make defconfig
              
              # 执行编译 (APK v3 格式)
              make package/custom/compile V=s
              
              # 关键：将生成的 bin 目录整体拷贝到挂载点
              mkdir -p /tmp/custom/output_bin
              cp -r bin/* /tmp/custom/output_bin/
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gecoosac-aarch64-apk
          # 4. 递归搜索 output_bin 下所有子目录里的 .apk 文件
          path: output_bin/**/*.apk
          # 如果编译后没找到特定后缀，建议临时改为 path: output_bin/ 查看结构
          if-no-files-found: warn
