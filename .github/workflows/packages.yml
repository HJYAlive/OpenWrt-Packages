name: Build GecoosAC APK for AN7581

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  Build_APK:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build in Docker Container
        run: |
          # 1. 赋予当前目录权限，确保容器内可以读写
          chmod -R 777 .

          # 2. 启动容器并执行编译指令
          # 我们把当前目录挂载到容器的 /home/build/openwrt/package/custom
          docker run --rm \
            -v "$(pwd)":/home/build/openwrt/package/custom \
            openwrt/sdk:aarch64_cortex-a53 \
            bash -c "
              # 更新 Feeds
              ./scripts/feeds update -a && ./scripts/feeds install -a
              
              # 编译插件 (SDK 会自动识别 package/custom 里的源码)
              make defconfig
              make package/custom/compile V=s
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gecoosac-aarch64-apk
          # 路径指向宿主机挂载出的 bin 目录
          path: bin/packages/aarch64_cortex-a53/base/*.apk
