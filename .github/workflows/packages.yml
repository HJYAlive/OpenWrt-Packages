name: Build GecoosAC APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Build_APK:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Cleanup and Fix Permissions
        run: |
          sudo rm -rf output_bin
          sudo chmod -R 777 .

      - name: Build in Docker Container
        run: |
          docker run --rm \
            -v "$(pwd)":/tmp/custom \
            openwrt/sdk:aarch64_cortex-a53 \
            bash -c "
              # 1. 深度搜索 scripts/feeds 所在的绝对路径
              REAL_SDK_DIR=\$(find /builder /home/build -name feeds -path '*/scripts/feeds' 2>/dev/null | sed 's/\/scripts\/feeds//' | head -n 1)
              
              if [ -z \"\$REAL_SDK_DIR\" ]; then
                echo \"❌ 致命错误：无法定位 SDK 核心目录\"
                ls -R /builder
                exit 1
              fi
              
              cd \"\$REAL_SDK_DIR\"
              echo \"✅ 成功进入 SDK 核心目录: \$PWD\"
              
              # 2. 准备源码
              mkdir -p package/custom
              cp -r /tmp/custom/* package/custom/

              # 3. 这里的 scripts/feeds 必然存在了
              ./scripts/feeds update -a && ./scripts/feeds install -a
              
              # 4. 编译
              make defconfig
              make package/custom/compile V=s
              
              # 5. 拷回产物
              mkdir -p /tmp/custom/output_bin
              [ -d \"bin\" ] && cp -r bin/* /tmp/custom/output_bin/
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gecoosac-aarch64-apk
          path: output_bin/**/*.apk
