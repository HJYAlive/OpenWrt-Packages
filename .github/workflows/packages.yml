name: Update OpenWrt Packages
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
  - cron: 0 */12 * * *

env:
  TZ: Asia/Shanghai

jobs:
  Update_OpenWrt_Packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@main

      - name: Setup Python 3.9.x
        uses: actions/setup-python@main
        with:
          python-version: '3.9.x'

      - name: Install Dependencies
        run: |
          sudo timedatectl set-timezone "$TZ"
          python -m pip install --upgrade pip
          pip install -U GitPython

      - name: Update OpenWrt Packages
        id: update
        run: |
          python packages.py
          rm -rf __pycache__
          echo "message=$(date)" >> $GITHUB_OUTPUT

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ steps.update.outputs.message }}
          
      - name: Build APK for AN7581
        run: |
          # 1. 定义基础路径 (airoha/an7581)
          BASE_URL="https://downloads.openwrt.org"
          
          # 2. 增强版抓取：直接获取包含 sdk 关键字的 href 链接
          # 修复 grep 逻辑，兼容不同 HTML 标签格式
          FILE_NAME=$(curl -sL "$BASE_URL/" | grep -oE 'openwrt-sdk-[^">]+\.tar\.xz' | head -n 1)
          
          if [ -z "$FILE_NAME" ]; then
            echo "错误：抓取不到 SDK 文件名！正在尝试深度搜索..."
            # 备用方案：如果当前目录没有，可能在子目录，尝试匹配最新的 aarch64_cortex-a53 架构 SDK
            FILE_NAME=$(curl -sL "$BASE_URL/" | grep -i "sdk" | grep -oE 'openwrt-sdk-[^">]+\.tar\.xz' | head -n 1)
          fi

          if [ -z "$FILE_NAME" ]; then
            echo "致命错误：网页内未发现任何 SDK 下载链接。请检查：$BASE_URL"
            exit 1
          fi
          
          echo "✅ 成功定位 SDK: $FILE_NAME"
          
          # 3. 下载并解压
          wget -q "$BASE_URL/$FILE_NAME" -O sdk.tar.xz
          mkdir -p sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1
          
          # 4. 准备环境 (SDK 内部操作)
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 5. 查找你的插件文件夹 (自动识别多种命名方式)
          # 假设你的仓库里有集客 AC 源码
          SOURCE_DIR=$(ls -d ../luci-app-gecoos* ../gecoos* 2>/dev/null | head -n 1)
          if [ -n "$SOURCE_DIR" ]; then
            cp -r "$SOURCE_DIR" package/gecoosac
            echo "✅ 已将源码 $SOURCE_DIR 拷贝至编译目录"
          else
            echo "❌ 错误：仓库根目录未发现 luci-app-gecoosac 源码文件夹！"
            ls -R ..
            exit 1
          fi
          
          # 6. 开始编译 (编译为 .apk 格式)
          make defconfig
          make package/gecoosac/compile V=s || true

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gecoosac-apk-an7581
          path: sdk/bin/targets/airoha/an7581/packages/*.apk


      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2
