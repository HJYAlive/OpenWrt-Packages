name: Update OpenWrt Packages
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
  - cron: 0 */12 * * *

env:
  TZ: Asia/Shanghai

jobs:
  Update_OpenWrt_Packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@main

      - name: Setup Python 3.9.x
        uses: actions/setup-python@main
        with:
          python-version: '3.9.x'

      - name: Install Dependencies
        run: |
          sudo timedatectl set-timezone "$TZ"
          python -m pip install --upgrade pip
          pip install -U GitPython

      - name: Update OpenWrt Packages
        id: update
        run: |
          python packages.py
          rm -rf __pycache__
          echo "message=$(date)" >> $GITHUB_OUTPUT

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ steps.update.outputs.message }}
          
      - name: Build APK for AN7581
        run: |
          # 1. 自动获取最新的 SDK 下载链接并下载
          SDK_URL=$(curl -s https://downloads.openwrt.org | grep -o 'openwrt-sdk-airoha-an7581_gcc-[^"]*\.tar\.xz' | head -n 1)
          echo "Downloading SDK from: https://downloads.openwrt.org$SDK_URL"
          wget "https://downloads.openwrt.org$SDK_URL"
          
          # 2. 解压并进入目录
          tar -xJf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk
          
          # 3. 更新 SDK feeds
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 4. 这里的 luci-app-gecoosac 文件夹名必须和你仓库里的文件夹名字一致
          # 如果你的文件夹叫别的名字，请修改下方 ../ 后的名称
          cp -r ../luci-app-gecoosac package/ || echo "Source folder luci-app-gecoosac not found in repo root"
          
          # 5. 编译 (由于是 Snapshot，可能需要强制执行)
          make defconfig
          make package/luci-app-gecoosac/compile V=s || true


          
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2
