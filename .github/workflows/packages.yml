name: Update OpenWrt Packages
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
  - cron: 0 */12 * * *

env:
  TZ: Asia/Shanghai

jobs:
  Update_OpenWrt_Packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@main

      - name: Setup Python 3.9.x
        uses: actions/setup-python@main
        with:
          python-version: '3.9.x'

      - name: Install Dependencies
        run: |
          sudo timedatectl set-timezone "$TZ"
          python -m pip install --upgrade pip
          pip install -U GitPython

      - name: Update OpenWrt Packages
        id: update
        run: |
          python packages.py
          rm -rf __pycache__
          echo "message=$(date)" >> $GITHUB_OUTPUT

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ steps.update.outputs.message }}
          
      - name: Build APK for AN7581
        run: |
          # 1. 直接从完整路径抓取 SDK 文件名，不使用中间变量拼接
          FILE_NAME=$(curl -sL "https://downloads.openwrt.org" | grep -oE 'openwrt-sdk-airoha-an7581_[^"]+\.tar\.xz' | head -n 1)
          
          if [ -z "$FILE_NAME" ]; then
            echo "错误：抓取不到文件名！正在输出网页内容诊断..."
            curl -sL "https://downloads.openwrt.org" | grep "openwrt-sdk" || echo "网页内未发现 sdk 关键字"
            exit 1
          fi
          
          echo "成功定位 SDK: $FILE_NAME"
          
          # 2. 直接下载完整链接
          wget -q "https://downloads.openwrt.org$FILE_NAME" -O sdk.tar.xz
          
          # 3. 创建目录并解压 (strip-components 保证进入后就是 SDK 根目录)
          mkdir -p sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1
          
          # 4. 准备 SDK 环境
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 5. 关键：把你的源码文件夹拷进去 (请确认文件夹名是 luci-app-gecoosac)
          # 注意：这里的 ../ 是因为刚才 cd sdk 进入了子目录
          if [ -d "../luci-app-gecoosac" ]; then
            cp -r ../luci-app-gecoosac package/
          elif [ -d "../gecoosac" ]; then
            cp -r ../gecoosac package/
          else
            echo "警告：仓库根目录没找到插件文件夹，尝试从当前所有文件夹中搜索..."
            ls -d ../*/
          fi
          
          # 6. 生成默认配置并执行编译 (.apk 格式)
          make defconfig
          make package/luci-app-gecoosac/compile V=s || make package/gecoosac/compile V=s || true

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gecoosac-apk-an7581
          path: sdk/bin/targets/airoha/an7581/packages/*.apk


      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2
