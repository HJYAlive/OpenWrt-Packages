name: Build GecoosAC APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Build_APK:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Cleanup and Fix Permissions
        run: |
          sudo rm -rf output_bin
          sudo chmod -R 777 .

      - name: Build in Docker Container
        run: |
          # 运行容器
          docker run --rm \
            -v "$(pwd)":/tmp/custom \
            openwrt/sdk:aarch64_cortex-a53 \
            bash -c "
              # 1. 自动定位 SDK 根目录 (寻找 scripts/feeds 所在的目录)
              # 官方镜像有时在 /builder, 有时在根目录, 我们通过 scripts 文件夹定位
              SDK_DIR=\$(find / -maxdepth 3 -name scripts -type d | sed 's/\/scripts//' | head -n 1)
              cd \"\$SDK_DIR\" || cd /builder || cd /home/build/openwrt || exit 1
              echo \"✅ 成功进入 SDK 目录: \$PWD\"
              
              # 2. 拷贝源码到 package
              mkdir -p package/custom
              cp -r /tmp/custom/* package/custom/

              # 3. 更新 Feeds 并编译
              ./scripts/feeds update -a && ./scripts/feeds install -a
              make defconfig
              
              # 4. 执行编译
              make package/custom/compile V=s
              
              # 5. 将 bin 目录整体拷贝到挂载点
              mkdir -p /tmp/custom/output_bin
              [ -d \"bin\" ] && cp -r bin/* /tmp/custom/output_bin/ || echo \"❌ 未发现 bin 目录\"
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gecoosac-aarch64-apk
          path: output_bin/**/*.apk
          if-no-files-found: warn
